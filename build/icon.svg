<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.55" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#0f2a6b"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- macOS squircle -->
  <rect x="100" y="100" width="824" height="824" rx="186" fill="url(#bg)"/>
  <rect x="100" y="100" width="824" height="824" rx="186" fill="url(#sheen)"/>

  <!-- cycle arcs -->
  <g stroke="#ffffff" stroke-width="64" stroke-linecap="round" fill="none">
    <path d="M 295.9 433.3 A 230 230 0 0 1 728.1 433.3"/>
    <path d="M 728.1 590.7 A 230 230 0 0 1 295.9 590.7"/>
  </g>

  <!-- arrowheads -->
  <g fill="#ffffff">
    <g transform="translate(728.1,433.3) rotate(70)">
      <path d="M 0 -58 L 100 0 L 0 58 Q 26 0 0 -58 Z"/>
    </g>
    <g transform="translate(295.9,590.7) rotate(250)">
      <path d="M 0 -58 L 100 0 L 0 58 Q 26 0 0 -58 Z"/>
    </g>
  </g>

  <!-- focus point -->
  <circle cx="512" cy="512" r="86" fill="#93c5fd"/>
  <circle cx="512" cy="512" r="86" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="6"/>
</svg>
